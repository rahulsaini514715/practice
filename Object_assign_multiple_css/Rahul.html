<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="e">hello</h1>
    <button id="btn">Change Color</button>

  
    <script>
         const h = {
      backgroundColor: 'red',
      color: 'green'
    };
          const r = document.getElementById('e');
          const t = document.getElementById('btn');

          const handclick = ()=>{
            Object.assign(r.style, h); 
          }

          t.addEventListener('keydown',handclick)
    </script>
</body>
</html>
