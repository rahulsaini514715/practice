    <!-- ✅ 14. Merge arrays without duplicates -->

    <!-- ✅ 15. Check if array is sorted -->
    <script>
        let arr15 = [1, 2, 3, 4, 5];
        let isSorted = arr15.every((v, i, a) => i === 0 || a[i - 1] <= v);
        console.log("Is Sorted:", isSorted);
    </script>

    <!-- ✅ 16. Find pairs with given sum -->
    <script>
        let arr16 = [1, 2, 3, 4, 5], target = 6;
        for (let i = 0; i < arr16.length; i++) {
            for (let j = i + 1; j < arr16.length; j++) {
                if (arr16[i] + arr16[j] === target) {
                    console.log("Pair:", [arr16[i], arr16[j]]);
                }
            }
        }
    </script>

    <!-- ✅ 17. Remove specific element -->
    <script>
        let arr17 = [1, 2, 3, 4];
        let removed = arr17.filter(n => n !== 3);
        console.log("After Removal:", removed);
    </script>

    <!-- ✅ 18. Chunk array into smaller arrays -->
    <script>
        let arr18 = [1, 2, 3, 4, 5];
        function chunk(arr, size) {
            let chunks = [];
            for (let i = 0; i < arr.length; i += size) {
                chunks.push(arr.slice(i, i + size));
            }
            return chunks;
        }
        console.log("Chunks:", chunk(arr18, 2));
    </script>

    <!-- ✅ 19. Common elements in two arrays -->
    <script>
        let arr19a = [1, 2, 3], arr19b = [2, 3, 4];
        console.log("Common:", arr19a.filter(v => arr19b.includes(v)));
    </script>

    <!-- ✅ 20. Map-Filter-Reduce chaining -->
    <script>
        let arr20 = [1, 2, 3, 4, 5];
        let total = arr20
            .filter(n => n % 2 !== 0)
            .map(n => n * 2)
            .reduce((a, b) => a + b, 0);
        console.log("Final Total:", total);
    </script>

    <!-- ✅ 21. Find intersection of multiple arrays -->
    <script>
        let arr21a = [1, 2, 3, 4];
        let arr21b = [2, 3];
        let arr21c = [2, 3, 5];
        let common = arr21a.filter(x => arr21b.includes(x) && arr21c.includes(x));
        console.log("Common in all:", common);
    </script>

    <!-- ✅ 22. Remove falsy values -->
    <script>
        let mixed = [0, 1, false, 2, '', 3, null, undefined];
        let truthy = mixed.filter(Boolean);
        console.log("Truthy Values:", truthy);
    </script>

    <!-- ✅ 23. Find duplicates -->
    <script>
        let arr23 = [1, 2, 2, 3, 4, 4, 5];
        let seen = new Set();
        let duplicates = arr23.filter(num => seen.has(num) || !seen.add(num));
        console.log("Duplicates:", [...new Set(duplicates)]);
    </script>

    <script>

        console.log("After removing 2:", arr24.slice(2));
    </script>

    <script>
        let arr25 = [1, 2, 2, 3, 2, 4];
        let count = arr25.filter(x => x === 2).length;
        console.log("Count of 2:", count);
    </script>

        let obj26 = Object.assign({}, arr26);
        console.log("Array to Object:", obj26);
    </script>

    <!-- ✅ 27. Find all indices of specific value -->
    <script>
        let arr27 = [1, 2, 3, 2, 4, 2];
        let indices = [];
        arr27.forEach((val, i) => { if (val === 2) indices.push(i); });
        console.log("Indices of 2:", indices);
    </script>

        let arr28 = [1, 2, 4, 5];
        console.log("First >3:", arr28.find(x => x > 3));
    </script>

    <!-- ✅ 29. Create range array (1 to 10) -->
    <script>
        let range = Array.from({ length: 10 }, (_, i) => i + 1);
        console.log("Range 1-10:", range);
    </script>

    <!-- ✅ 30. Partition array by condition -->
    <script>
        let nums30 = [1, 2, 3, 4, 5, 6];
        let partitioned = [nums30.filter(x => x % 2 === 0), nums30.filter(x => x % 2 !== 0)];
        console.log("Partitioned [even, odd]:", partitioned);
    </script>

    <!-- ✅ 31. Insert at specific position -->
    <script>
        let arr31 = [1, 2, 4, 5];
        let pos = 2, newVal = 3;
        arr31.splice(pos, 0, newVal);
        console.log("After insert:", arr31);
    </script>

    <!-- ✅ 32. Replace all elements with a value -->
    <script>
        let arr32 = new Array(5).fill("X");
        console.log("Filled:", arr32);
    </script>

    <!-- ✅ 33. Remove last n elements -->
    <script>
        let arr33 = [1, 2, 3, 4, 5];
        console.log("Without last 2:", arr33.slice(0, -2));
    </script>

    <!-- ✅ 34. Split array into even and odd -->
    <script>
        let arr34 = [10, 11, 12, 13, 14];
        let evens = [], odds = [];
        arr34.forEach(n => (n % 2 === 0 ? evens : odds).push(n));
        console.log("Evens:", evens);
        console.log("Odds:", odds);
    </script>

    <!-- ✅ 35. Find mode (most frequent) -->
    <script>
        let arr35 = [1, 2, 2, 3, 3, 3, 4];
        let map = {};
        arr35.forEach(x => map[x] = (map[x] || 0) + 1);
        let mode = Object.keys(map).reduce((a, b) => map[a] > map[b] ? a : b);
        console.log("Mode:", mode);
    </script>

    <!-- ✅ 36. Get unique elements preserving order -->
    <script>
        let arr36 = [1, 2, 1, 3, 2, 4];
        let unique36 = arr36.filter((val, idx) => arr36.indexOf(val) === idx);
        console.log("Unique (order):", unique36);
    </script>

    <!-- ✅ 37. Swap two elements -->
    <script>
        let arr37 = [1, 2, 3, 4];
        [arr37[0], arr37[2]] = [arr37[2], arr37[0]];
        console.log("Swapped:", arr37);
    </script>

    <!-- ✅ 38. Find k largest elements -->
    <script>
        let arr38 = [4, 1, 7, 3, 9, 2];
        let k = 3;
        let topK = [...arr38].sort((a, b) => b - a).slice(0, k);
        console.log(`Top ${k} elements:`, topK);
    </script>

    <!-- ✅ 39. Sum of positive numbers -->
    <script>
        let arr39 = [-1, 2, -3, 4, 5];
        let posSum = arr39.filter(x => x > 0).reduce((a, b) => a + b, 0);
        console.log("Positive Sum:", posSum);
    </script>

    <!-- ✅ 40. Convert array of objects to a single object -->
    <script>
        let arr40 = [{ key: 'a', val: 1 }, { key: 'b', val: 2 }];
        let obj40 = arr40.reduce((acc, curr) => {
            acc[curr.key] = curr.val;
            return acc;
        }, {});
        console.log("Object:", obj40);
    </script>
